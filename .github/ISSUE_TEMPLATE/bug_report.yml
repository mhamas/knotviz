name: 🐞 Bug report
description: Report an issue with Knotviz
labels: [ pending triage ]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is. If you intend to submit a PR for this issue, tell us in the description. Thanks!
      placeholder: Bug description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce. If the bug is triggered by a specific graph file, please attach a minimal example (drag the file into this field, or paste a gist link). A [minimal reproducible example](https://stackoverflow.com/help/minimal-reproducible-example) is required unless the issue is obvious from the description.
      placeholder: Reproduction
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Which import format is involved?
      multiple: false
      options:
        - JSON
        - CSV (edge-list)
        - CSV (pair)
        - GraphML
        - GEXF
        - Not format-related
    validations:
      required: false

  - type: input
    id: graph-size
    attributes:
      label: Graph size
      description: Approximate number of nodes and edges, if relevant.
      placeholder: e.g. 50k nodes, 200k edges

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and version? Run `navigator.userAgent` in the console if unsure.
      placeholder: e.g. Chrome 124, Firefox 125, Safari 17.4
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Which OS does your browser run on?

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      description: Before submitting the issue, please make sure you do the following
      options:
        - label: Read the [Contributing Guidelines](https://github.com/mhamas/knotviz/blob/main/CONTRIBUTING.md).
          required: true
        - label: Check that there isn't [already an issue](https://github.com/mhamas/knotviz/issues) that reports the same bug to avoid creating a duplicate.
          required: true
        - label: This is a concrete bug report. For questions or discussion, open a [GitHub Discussion](https://github.com/mhamas/knotviz/discussions) instead.
          required: true
